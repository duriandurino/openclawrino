name: electron-app-core
phase: enum
description: Baseline full-pentest enumeration bundle for Electron-driven desktop or kiosk app surfaces.
steps:
  - script: enum/ports/scan_ports_fast.sh
    args: ["--target", "{{target}}", "--engagement", "{{engagement}}"]
  - script: enum/ports/scan_ports_service.sh
    args: ["--target", "{{target}}", "--engagement", "{{engagement}}"]
  - script: enum/web/enum_web_basic.sh
    args: ["--target", "{{target}}", "--engagement", "{{engagement}}"]
  - script: enum/web/enum_nestjs_api.sh
    args: ["--target", "{{target}}", "--engagement", "{{engagement}}", "--safe"]
