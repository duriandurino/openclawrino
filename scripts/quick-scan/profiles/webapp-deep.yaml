name: webapp-deep
kind: quick-scan
description: Deeper web application triage with recon plus non-safe web enumeration.
steps:
  - phase: recon
    script: orchestration/run_recon_profile.py
    args: ["--profile", "recon-external-web", "--target", "{{target}}", "--engagement", "{{engagement}}"]
  - phase: enum
    script: enum/web/enum_web_basic.sh
    args: ["--target", "{{target}}", "--engagement", "{{engagement}}"]
  - phase: vuln
    script: vuln/web/web_baseline.sh
    args: ["--target", "{{target}}", "--engagement", "{{engagement}}"]
