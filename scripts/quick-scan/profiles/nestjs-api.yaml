name: nestjs-api
kind: quick-scan
description: Safe NestJS API triage with framework/docs enum and NestJS-specific baseline checks.
steps:
  - phase: enum
    script: enum/web/enum_nestjs_api.sh
    args: ["--target", "{{target}}", "--engagement", "{{engagement}}", "{{safe_flag}}"]
  - phase: vuln
    script: vuln/web/vuln_nestjs_baseline.sh
    args: ["--target", "{{target}}", "--engagement", "{{engagement}}", "{{safe_flag}}"]
