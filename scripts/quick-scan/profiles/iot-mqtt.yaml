name: iot-mqtt
kind: quick-scan
description: Fast IoT/MQTT triage with host exposure checks plus MQTT port probing and safe web review.
steps:
  - phase: enum
    script: enum/ports/scan_ports_fast.sh
    args: ["--target", "{{target}}", "--engagement", "{{engagement}}"]
  - phase: enum
    script: enum/ports/scan_ports_service.sh
    args: ["--target", "{{target}}", "--engagement", "{{engagement}}"]
  - phase: enum
    script: enum/services/mqtt_probe.sh
    args: ["--target", "{{target}}", "--engagement", "{{engagement}}", "{{safe_flag}}"]
  - phase: enum
    script: enum/web/enum_web_basic.sh
    args: ["--target", "{{target}}", "--engagement", "{{engagement}}", "{{safe_flag}}"]
    optional: true
  - phase: vuln
    script: vuln/web/web_baseline.sh
    args: ["--target", "{{target}}", "--engagement", "{{engagement}}", "{{safe_flag}}"]
    optional: true
